<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Toko Siap Antar</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{font-family:Arial;background:#f4f4f4;padding:20px;}
.card{background:white;padding:15px;border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);margin-bottom:10px;}
#map{height:280px;margin-top:10px;}
button{background:green;color:white;padding:12px;border:none;
border-radius:5px;width:100%;margin-top:8px;font-size:15px;}
.harga{color:#0a7a00;font-weight:bold;}
</style>
</head>
<body>

<h2>🛒 Toko Siap Antar</h2>

<h3>Pilih Produk</h3>
<input id="cari" placeholder="Cari nama / kode..." onkeyup="filterProduk()" style="width:100%;padding:8px;">
<div id="hasil"></div>

<h3>Pilih Lokasi Rumah</h3>
<div id="map"></div>
<button onclick="ambilLokasi()">📍 Gunakan Lokasi Saya</button>
<button onclick="proses()">Setuju & Kirim ke WhatsApp</button>

<script>
// ====== GOOGLE SHEET ======
const sheetId="1iPbtRG1dW5yz6tuUZ5oHzMGsnNb4cHyCbAEMkq51gK4";
const tabProduk="Stock Konter";

fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?sheet=${encodeURIComponent(tabProduk)}`)
.then(r=>r.text())
.then(t=>{
const json=JSON.parse(t.substring(47).slice(0,-2));
const rows=json.table.rows;

window.dataProduk=rows.map(r=>({
kode:r.c[0]?.v||"",
nama:r.c[1]?.v||"",
harga:r.c[3]?.v||0,
stok:r.c[6]?.v||0
}));

tampilProduk(dataProduk);
});

function tampilProduk(d){
hasil.innerHTML="";
d.forEach(p=>{
let status=p.stok>0?`Stok: ${p.stok}`:`<span style="color:red">Habis</span>`;
hasil.innerHTML+=`
<div class="card">
<label>
<input type="checkbox"
value="${p.harga}"
data-nama="${p.nama}"
${p.stok<=0?"disabled":""}>
<b>${p.kode}</b><br>
${p.nama}<br>
<span class="harga">Rp ${parseInt(p.harga).toLocaleString()}</span><br>
${status}
</label>
</div>`;
});
}

function filterProduk(){
let q=cari.value.toLowerCase();
tampilProduk(dataProduk.filter(x=>
x.nama.toLowerCase().includes(q)||
x.kode.toLowerCase().includes(q)
));
}

function ambilProdukTerpilih(){
let checked=document.querySelectorAll("input[type=checkbox]:checked");
let total=0;
let daftar="";
checked.forEach(item=>{
let harga=parseInt(item.value);
let nama=item.dataset.nama;
total+=harga;
daftar+=`- ${nama} (Rp ${harga.toLocaleString()})\n`;
});
return {total,daftar};
}

// ===== MAP =====
const tokoLat=-6.883831;
const tokoLng=108.302788;

let tujuanLat=null;
let tujuanLng=null;

var map=L.map('map').setView([tokoLat,tokoLng],16);

L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{attribution:'Tiles © Esri'}
).addTo(map);

L.tileLayer(
'https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png',
{subdomains:'abcd',maxZoom:20}
).addTo(map);

L.marker([tokoLat,tokoLng]).addTo(map)
.bindPopup("Lokasi Toko").openPopup();

let markerTujuan;

map.on('click',function(e){
tujuanLat=e.latlng.lat;
tujuanLng=e.latlng.lng;
if(markerTujuan) map.removeLayer(markerTujuan);
markerTujuan=L.marker([tujuanLat,tujuanLng])
.addTo(map).bindPopup("Lokasi Rumah").openPopup();
});

function ambilLokasi(){
navigator.geolocation.getCurrentPosition(function(pos){
tujuanLat=pos.coords.latitude;
tujuanLng=pos.coords.longitude;
map.setView([tujuanLat,tujuanLng],17);
if(markerTujuan) map.removeLayer(markerTujuan);
markerTujuan=L.marker([tujuanLat,tujuanLng])
.addTo(map).bindPopup("Lokasi Rumah Anda").openPopup();
},{enableHighAccuracy:true});
}

// ===== ONGKIR =====
const kmPerLiter=50;
const hargaPerLiter=10000;
const biayaJasa=3000;
const biayaPerawatan=2000;
const minimumOngkir=7000;

async function proses(){

let produk=ambilProdukTerpilih();
if(produk.total===0 || tujuanLat===null){
alert("Pilih produk dan lokasi dulu!");
return;
}

let route=await fetch(
`https://router.project-osrm.org/route/v1/driving/${tokoLng},${tokoLat};${tujuanLng},${tujuanLat}?overview=false`
);

let routeData=await route.json();
let jarakKm=routeData.routes[0].distance/1000;

let bensin=jarakKm/kmPerLiter;
let biayaBBM=(bensin*hargaPerLiter)*2;

let ongkir=biayaBBM+biayaJasa+biayaPerawatan;
if(ongkir<minimumOngkir) ongkir=minimumOngkir;
ongkir=Math.ceil(ongkir/1000)*1000;

let totalBayar=produk.total+ongkir;

let linkMaps="https://www.google.com/maps?q="+tujuanLat+","+tujuanLng;

let pesan=
"Halo, saya mau pesan:%0A%0A"+
produk.daftar.replace(/\n/g,"%0A")+
"%0A"+
"Total Barang: Rp"+produk.total.toLocaleString()+"%0A"+
"Jarak: "+jarakKm.toFixed(1)+" km%0A"+
"Ongkir: Rp"+ongkir.toLocaleString()+"%0A"+
"TOTAL BAYAR: Rp"+totalBayar.toLocaleString()+"%0A%0A"+
"Lokasi Rumah:%0A"+linkMaps;

window.open("https://wa.me/6282319264646?text="+pesan);
}
</script>
</body>
</html>
