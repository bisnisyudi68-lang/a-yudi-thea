<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Toko Siap Antar</title>

<style>
body{font-family:Arial;background:#f4f4f4;padding:20px;}
.card{
 background:white;
 padding:20px;
 border-radius:10px;
 box-shadow:0 0 10px rgba(0,0,0,0.1);
 max-width:500px;
 margin:auto;
}
#map{height:300px;margin-top:10px;}
button{
 background:green;
 color:white;
 padding:12px;
 border:none;
 border-radius:5px;
 width:100%;
 font-size:16px;
 margin-top:10px;
}
</style>
</head>
<body>

<div class="card">
<h2>🛒 Toko Siap Antar</h2>

<h3>Pilih Barang</h3>
<label><input type="checkbox" value="15000"> Minyak Goreng - Rp15.000</label><br>
<label><input type="checkbox" value="60000"> Beras 5kg - Rp60.000</label><br>
<label><input type="checkbox" value="14000"> Gula 1kg - Rp14.000</label><br>

<h3>Pilih Lokasi Rumah (Satelit)</h3>
<div id="map"></div>

<button onclick="proses()">Setuju & Kirim ke WhatsApp</button>
</div>

<script>
const toko = { lat: -6.883831, lng: 108.302788 };

const kmPerLiter = 50;
const hargaPerLiter = 15000;
const biayaJasa = 3000;
const biayaPerawatan = 2000;
const minimumOngkir = 7000;

let tujuan = null;
let map;
let marker;

function initMap() {

 map = new google.maps.Map(document.getElementById("map"), {
   center: toko,
   zoom: 15,
   mapTypeId: 'satellite'
 });

 new google.maps.Marker({
   position: toko,
   map: map,
   title: "Lokasi Toko"
 });

 map.addListener("click", (e) => {
   tujuan = e.latLng;

   if(marker){
     marker.setMap(null);
   }

   marker = new google.maps.Marker({
     position: tujuan,
     map: map
   });
 });

}

async function proses(){

 let barang = document.querySelectorAll("input[type=checkbox]:checked");

 if(barang.length === 0 || tujuan === null){
   alert("Pilih barang dan klik lokasi rumah dulu!");
   return;
 }

 let totalBarang = 0;
 barang.forEach(item=>{
   totalBarang += parseInt(item.value);
 });

 let service = new google.maps.DistanceMatrixService();

 service.getDistanceMatrix({
   origins: [toko],
   destinations: [tujuan],
   travelMode: 'DRIVING',
 }, function(response,status){

   if(status !== "OK"){
     alert("Gagal hitung jarak");
     return;
   }

   let jarakKm = response.rows[0].elements[0].distance.value / 1000;

   let bensin = jarakKm / kmPerLiter;
   let biayaBBM = (bensin * hargaPerLiter) * 2;

   let ongkir = biayaBBM + biayaJasa + biayaPerawatan;

   if(ongkir < minimumOngkir){
     ongkir = minimumOngkir;
   }

   ongkir = Math.ceil(ongkir / 1000) * 1000;

   let totalBayar = totalBarang + ongkir;

   let pesan =
   "Halo, saya mau pesan:%0A%0A" +
   "Total Barang: Rp" + totalBarang.toLocaleString() + "%0A" +
   "Jarak: " + jarakKm.toFixed(1) + " km%0A" +
   "Ongkir: Rp" + ongkir.toLocaleString() + "%0A" +
   "TOTAL BAYAR: Rp" + totalBayar.toLocaleString();

   window.open("https://wa.me/6282319264646?text=" + pesan);

 });

}
</script>

<script async
src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap">
</script>

</body>
</html>
