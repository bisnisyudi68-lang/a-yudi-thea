<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Toko Siap Antar</title>
<style>
body{
  font-family: Arial;
  background:#f4f4f4;
  padding:20px;
}
.card{
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
  max-width:500px;
  margin:auto;
}
h2{text-align:center;}
button{
  background:green;
  color:white;
  padding:12px;
  border:none;
  border-radius:5px;
  width:100%;
  font-size:16px;
}
.total{
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>
<body>

<div class="card">
<h2>🛒 Toko Siap Antar</h2>

<h3>Pilih Barang</h3>
<label><input type="checkbox" value="15000"> Minyak Goreng - Rp15.000</label><br>
<label><input type="checkbox" value="60000"> Beras 5kg - Rp60.000</label><br>
<label><input type="checkbox" value="14000"> Gula 1kg - Rp14.000</label><br><br>

<label>Alamat Pembeli</label><br>
<textarea id="alamat" rows="3" style="width:100%;"></textarea><br><br>

<button onclick="proses()">Setuju & Kirim ke WhatsApp</button>

</div>

<script>
const tokoLat = -6.883831;
const tokoLng = 108.302788;

const kmPerLiter = 50;
const hargaPerLiter = 10000;
const biayaJasa = 3000;
const biayaPerawatan = 2000;
const minimumOngkir = 7000;
const maxRadius = 75;

async function proses(){

 let alamat = document.getElementById("alamat").value;
 let barang = document.querySelectorAll("input[type=checkbox]:checked");

 if(barang.length === 0 || alamat === ""){
   alert("Lengkapi dulu ya!");
   return;
 }

 let totalBarang = 0;
 barang.forEach(item=>{
   totalBarang += parseInt(item.value);
 });

 try{

   // Geocoding alamat
   let geo = await fetch("https://nominatim.openstreetmap.org/search?format=json&q=" + encodeURIComponent(alamat));
   let geoData = await geo.json();

   if(geoData.length === 0){
     alert("Alamat tidak ditemukan");
     return;
   }

   let tujuanLat = geoData[0].lat;
   let tujuanLng = geoData[0].lon;

   // Hitung jarak
   let route = await fetch(
   `https://router.project-osrm.org/route/v1/driving/${tokoLng},${tokoLat};${tujuanLng},${tujuanLat}?overview=false`
   );

   let routeData = await route.json();

   if(!routeData.routes){
     alert("Gagal hitung jarak");
     return;
   }

   let jarakKm = routeData.routes[0].distance / 1000;

   if(jarakKm > maxRadius){
     alert("Maaf, jarak maksimal 25 km");
     return;
   }

   let bensin = jarakKm / kmPerLiter;
   let biayaBBM = (bensin * hargaPerLiter) * 2;

   let ongkir = biayaBBM + biayaJasa + biayaPerawatan;

   if(ongkir < minimumOngkir){
     ongkir = minimumOngkir;
   }

   ongkir = Math.ceil(ongkir / 1000) * 1000;

   let totalBayar = totalBarang + ongkir;

   let pesan =
   "Halo, saya mau pesan:%0A%0A" +
   "Total Barang: Rp" + totalBarang.toLocaleString() + "%0A" +
   "Jarak: " + jarakKm.toFixed(1) + " km%0A" +
   "Ongkir: Rp" + ongkir.toLocaleString() + "%0A" +
   "TOTAL BAYAR: Rp" + totalBayar.toLocaleString() + "%0A%0A" +
   "Alamat:%0A" + alamat;

   window.open("https://wa.me/6282319264646?text=" + pesan);

 }catch(error){
   alert("Terjadi error koneksi");
 }

}
</script>

</body>
</html>
