<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Toko Siap Antar</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
  font-family:Arial;
  background:#f4f4f4;
  padding:20px;
}
.card{
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
  max-width:500px;
  margin:auto;
}
#map{
  height:300px;
  margin-top:10px;
}
button{
  background:green;
  color:white;
  padding:12px;
  border:none;
  border-radius:5px;
  width:100%;
  font-size:16px;
  margin-top:10px;
}
</style>
</head>
<body>

<div class="card">
<h2>🛒 Toko Siap Antar</h2>

<h3>Pilih Barang</h3>
<label><input type="checkbox" value="15000"> Minyak Goreng - Rp15.000</label><br>
<label><input type="checkbox" value="60000"> Beras 5kg - Rp60.000</label><br>
<label><input type="checkbox" value="14000"> Gula 1kg - Rp14.000</label><br>

<h3>Pilih Lokasi Rumah (Klik Map)</h3>
<div id="map"></div>
<button onclick="ambilLokasi()">📍 Gunakan Lokasi Saya</button>
<button onclick="proses()">Setuju & Kirim ke WhatsApp</button>
</div>

<script>
const tokoLat = -6.883831;
const tokoLng = 108.302788;

const kmPerLiter = 50;
const hargaPerLiter = 10000;
const biayaJasa = 3000;
const biayaPerawatan = 2000;
const minimumOngkir = 7000;

let tujuanLat = null;
let tujuanLng = null;

// Buat map satelit
var map = L.map('map').setView([tokoLat, tokoLng], 16);

L.tileLayer(
 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
 {
   attribution: 'Tiles © Esri'
 }
).addTo(map);
L.tileLayer(
 'https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png',
 {
   attribution: 'Labels © CARTO',
   subdomains: 'abcd',
   maxZoom: 20
 }
).addTo(map);
// Marker toko
L.marker([tokoLat, tokoLng]).addTo(map)
.bindPopup("Lokasi Toko").openPopup();

let markerTujuan;

// Klik map untuk pilih rumah
map.on('click', function(e){

 tujuanLat = e.latlng.lat;
 tujuanLng = e.latlng.lng;

 if(markerTujuan){
   map.removeLayer(markerTujuan);
 }

 markerTujuan = L.marker([tujuanLat, tujuanLng])
   .addTo(map)
   .bindPopup("Lokasi Rumah")
   .openPopup();

});

async function proses(){

 let barang = document.querySelectorAll("input[type=checkbox]:checked");

 if(barang.length === 0 || tujuanLat === null){
   alert("Pilih barang dan klik lokasi rumah dulu!");
   return;
 }

 let totalBarang = 0;
 barang.forEach(item=>{
   totalBarang += parseInt(item.value);
 });

 // Hitung jarak pakai OSRM
 let route = await fetch(
 `https://router.project-osrm.org/route/v1/driving/${tokoLng},${tokoLat};${tujuanLng},${tujuanLat}?overview=false`
 );

 let routeData = await route.json();

 let jarakKm = routeData.routes[0].distance / 1000;

 let bensin = jarakKm / kmPerLiter;
 let biayaBBM = (bensin * hargaPerLiter) * 2;

 let ongkir = biayaBBM + biayaJasa + biayaPerawatan;

 if(ongkir < minimumOngkir){
   ongkir = minimumOngkir;
 }

 ongkir = Math.ceil(ongkir / 1000) * 1000;

 let totalBayar = totalBarang + ongkir;

 let pesan =
 "Halo, saya mau pesan:%0A%0A" +
 "Total Barang: Rp" + totalBarang.toLocaleString() + "%0A" +
 "Jarak: " + jarakKm.toFixed(1) + " km%0A" +
 "Ongkir: Rp" + ongkir.toLocaleString() + "%0A" +
 "TOTAL BAYAR: Rp" + totalBayar.toLocaleString();
 window.open("https://wa.me/6282319264646?text=" + pesan);

}
</script>

</body>
</html>
